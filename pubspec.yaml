name: blood_donation
description: "A blood donation smart platform application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Fonts & UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Formatting
  intl: ^0.18.1

  # Networking
  http: ^1.2.2

  # Local storage
  shared_preferences: ^2.3.2

  # Location
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # QR code display (donor shows QR to hospital)
  qr_flutter: ^4.1.0

  # QR code scanning (requester scans hospital QR)
  mobile_scanner: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true