flutter_native_splash:

  # ── Background color ─────────────────────────────────────────────────────
  # Pure white — matches the login screen background
  color: "#FFFFFF"
  color_dark: "#FFFFFF"

  # ── Logo ─────────────────────────────────────────────────────────────────
  image: assets/images/splash_logo.png
  image_dark: assets/images/splash_logo.png

  # ── Android 12+ (API 31+) ────────────────────────────────────────────────
  android_12:
    color: "#FFFFFF"
    color_dark: "#FFFFFF"
    image: assets/images/splash_logo.png
    icon_background_color: "#FFFFFF"
    icon_background_color_dark: "#FFFFFF"

  # ── iOS ──────────────────────────────────────────────────────────────────
  color_ios: "#FFFFFF"
  color_dark_ios: "#FFFFFF"
  image_ios: assets/images/splash_logo.png

  # ── Settings ─────────────────────────────────────────────────────────────
  android: true
  ios: true
  web: false
  fullscreen: false